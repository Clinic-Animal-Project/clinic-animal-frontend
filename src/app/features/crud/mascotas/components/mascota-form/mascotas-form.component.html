<div class="p-6 bg-gray-50 min-h-screen">
  <button (click)="volver()" class="inline-flex items-center gap-2 text-gray-600 hover:text-primary-700 font-medium mb-6 group transition-colors">
    <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    <span>Regresar al mantenimiento</span>
  </button>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-6">
    <h1 class="text-3xl font-bold text-dark-800 flex items-center gap-3">
      <div class="w-12 h-12 bg-primary-100 rounded-xl flex items-center justify-center">
        <span class="text-2xl">🐾</span>
      </div>
      {{ isEditMode() ? 'Editar Paciente' : 'Nueva Mascota' }}
    </h1>
  </div>

  @if (loading()) {
    <div class="flex flex-col items-center justify-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-primary-200 border-t-primary-600"></div>
      <p class="mt-4 text-gray-500 font-medium">Cargando expediente...</p>
    </div>
  } @else {
    <div class="bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden max-w-4xl">
      <form [formGroup]="mascotaForm" (ngSubmit)="onSubmit()" class="p-8 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          
          <div>
            <label class="block text-sm font-bold text-dark-700 mb-2">Nombre <span class="text-red-500">*</span></label>
            <input type="text" formControlName="nombre" 
                   [class.border-red-500]="isFieldInvalid('nombre')"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 outline-none transition-all"
                   placeholder="Nombre de la mascota">
          </div>

          <div>
            <label class="block text-sm font-bold text-dark-700 mb-2">Propietario <span class="text-red-500">*</span></label>
            <select formControlName="idCliente" 
                    [class.border-red-500]="isFieldInvalid('idCliente')"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 outline-none bg-white transition-all">
              <option value="" disabled selected>Seleccione al dueño...</option>
              @for (c of clientes(); track c.id) {
                <option [value]="c.id">{{ c.nombre }} {{ c.apellido }}</option>
              }
            </select>
          </div>

          <div>
            <label class="block text-sm font-bold text-dark-700 mb-2">Especie <span class="text-red-500">*</span></label>
            <input type="text" formControlName="especie" 
                   [class.border-red-500]="isFieldInvalid('especie')"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 outline-none transition-all"
                   placeholder="Ej: Perro">
          </div>

          <div>
            <label class="block text-sm font-bold text-dark-700 mb-2">Raza <span class="text-red-500">*</span></label>
            <input type="text" formControlName="raza" 
                   [class.border-red-500]="isFieldInvalid('raza')"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-primary-500" 
                   placeholder="Ej: Pitbull">
          </div>

          <div>
            <label class="block text-sm font-bold text-dark-700 mb-2">Edad (Años) <span class="text-red-500">*</span></label>
            <input type="number" formControlName="edad" 
                   [class.border-red-500]="isFieldInvalid('edad')"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-primary-500" 
                   min="0">
          </div>

          <div>
            <label class="block text-sm font-bold text-dark-700 mb-2">Sexo <span class="text-red-500">*</span></label>
            <div class="flex gap-6 mt-2">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" value="Macho" formControlName="sexo"> ♂ Macho
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" value="Hembra" formControlName="sexo"> ♀ Hembra
              </label>
            </div>
          </div>
        </div>

        <div class="flex justify-end gap-4 pt-8 border-t border-gray-100">
          <button type="button" (click)="volver()" class="px-8 py-3 border-2 border-gray-200 text-gray-500 font-bold rounded-xl hover:bg-gray-50 transition-all">
            Cancelar
          </button>
          <button type="submit" [disabled]="submitting()" 
                  class="bg-linear-to-r from-primary-600 to-primary-700 text-white px-10 py-3 rounded-xl font-black uppercase tracking-widest shadow-lg hover:scale-105 transition-all flex items-center gap-2 disabled:opacity-50">
            @if (submitting()) { <div class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div> }
            {{ isEditMode() ? 'Actualizar' : 'Guardar Mascota' }}
          </button>
        </div>
      </form>
    </div>
  }
</div>
