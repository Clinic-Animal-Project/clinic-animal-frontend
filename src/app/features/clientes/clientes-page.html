<div class="p-8">
  <h1 class="text-3xl font-bold text-gray-800 mb-6">Clientes</h1>
<input type="number" [(ngModel)]="clienteId" placeholder="Ingrese ID del cliente"
       class="p-2 rounded border border-gray-300 mr-2">

<button (click)="buscarClientePorId(clienteId)"
        class="bg-blue-200 text-blue-900 font-bold py-2 px-4 rounded
               transform transition-transform duration-200 hover:scale-110 hover:shadow-lg">
  Buscar Cliente
</button>
<br><br>
  <div class="bg-white shadow-xl rounded-2xl border border-gray-100 animate-fade-in">
    <table class="min-w-full text-base text-left border-collapse rounded-lg overflow-hidden">
        
      <!-- HEADER -->
      <thead class="bg-indigo-500 text-white text-sm uppercase">
        <tr>
            <th></th>
          <th class="px-14 py-4 first:rounded-tl-lg"> ID</th>
          <th class="px-6 py-4">Cliente</th>
          <th class="px-6 py-4">DNI</th>
          <th class="px-6 py-4">Teléfono</th>
          <th class="px-6 py-4">Email</th>
          <th class="px-6 py-4 last:rounded-tr-lg">Dirección</th>
        </tr>
      </thead>

      <!-- BODY -->
      <tbody class="divide-y">
<tr *ngFor="let c of clientes"
    (click)="abrirModal(c)"
    class="hover:bg-indigo-50 transition duration-200 cursor-pointer">
                      <td class="px-6 py-4 font-semibold text-gray-700">
                        -
                      </td>
          <td class="px-6 py-4 font-semibold text-gray-700">
            #{{ c.id }}
          </td>

          <td class="px-6 py-4">
            <div class="flex flex-col">
              <span class="font-semibold text-gray-800">
                {{ c.nombre }} {{ c.apellido }}
              </span>
              <span class="text-xs text-gray-400">
                Cliente registrado
              </span>
            </div>
          </td>

          <td class="px-6 py-4 text-gray-600">
            {{ c.dni }}
          </td>

          <td class="px-6 py-4 text-gray-600">
            {{ c.telefono }}
          </td>

          <td class="px-6 py-4 text-indigo-600 font-medium">
            {{ c.email }}
          </td>

          <td class="px-6 py-4 text-gray-500">
            {{ c.direccion || '—' }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
