<div class="p-10 bg-[var(--color-dark-50)] min-h-screen">
  <h1 class="text-4xl md:text-3xl font-extrabold text-[var(--color-dark-700)] mb-8 tracking-tight">Mascotas</h1>
  <br>
  <!-- 🔎 BUSCADOR -->
<div class="w-full max-w-lg mx-auto">
  <input type="text"
         [(ngModel)]="nombreBusqueda"
         (input)="buscarPorNombre()"
         placeholder="Buscar mascota por nombre"
         class="w-full px-6 py-4 rounded-2xl border-2 border-[var(--color-dark-300)]
                text-lg text-[var(--color-dark-700)] placeholder:text-[var(--color-dark-400)]
                focus:outline-none focus:ring-4 focus:ring-[var(--color-primary-300)]
                focus:border-[var(--color-primary-600)]
                caret-[var(--color-primary-600)]
                bg-[var(--color-primary-50)] hover:bg-[var(--color-primary-100)]
                transition duration-300"
         style="padding-left: 1.5rem; /* 24px extra para separar caret del borde */">
</div><br><br>
  <!-- 📋 TABLA -->
  <div class="bg-white shadow-2xl rounded-3xl border border-[var(--color-dark-100)] overflow-x-auto animate-fade-in">
    <table class="min-w-full text-base text-left border-collapse rounded-2xl overflow-hidden">

      <!-- HEADER -->
      <thead class="bg-[var(--color-primary-600)] text-white text-sm uppercase tracking-wider">
        <tr>
          <th></th>
          <th class="px-6 py-4">ID</th>
          <th class="px-6 py-4">Mascota</th>
          <th class="px-6 py-4">Especie</th>
          <th class="px-6 py-4">Raza</th>
          <th class="px-6 py-4">Edad</th>
          <th class="px-6 py-4">Género</th>
          <th class="px-6 py-4">ID de Dueño</th>
          <th class="px-6 py-4 last:rounded-tr-2xl">Acción</th>
        </tr>
      </thead>

      <!-- BODY -->
      <tbody class="divide-y">
        <tr *ngFor="let m of mascotas"
            class="hover:bg-[var(--color-primary-50)] transition duration-300 cursor-pointer group">

          <td class="px-6 py-5 font-semibold text-[var(--color-dark-700)]">-</td>
          <td class="px-6 py-5 font-semibold text-[var(--color-dark-700)]">#{{ m.id }}</td>

          <td class="px-6 py-5">
            <div class="flex flex-col">
              <span class="font-semibold text-[var(--color-dark-700)] text-lg group-hover:text-[var(--color-primary-600)] transition">{{ m.nombre }}</span>
              <span class="text-xs md:text-sm text-[var(--color-dark-400)]">Mascota registrada</span>
            </div>
          </td>

          <td class="px-6 py-5 text-[var(--color-dark-500)] text-lg">{{ m.especie }}</td>
          <td class="px-6 py-5 text-[var(--color-dark-500)] text-lg">{{ m.raza }}</td>
          <td class="px-6 py-5 text-[var(--color-dark-500)] text-lg">{{ m.edad }}</td>
          <td class="px-6 py-5 text-[var(--color-primary-600)] font-medium text-lg">{{ m.sexo }}</td>
          <td class="px-6 py-5 text-[var(--color-dark-500)] text-lg">{{ m.idCliente || '—' }}</td>

          <td class="px-6 py-5">
            <button (click)="guardarSeleccion(m)"
                    class="bg-[var(--color-primary-600)] text-white px-6 py-3 text-lg rounded-xl
                           hover:bg-[var(--color-primary-500)] transition font-semibold shadow-md hover:shadow-xl">
              Seleccionar
            </button>
          </td>

        </tr>
      </tbody>
    </table>
  </div>
</div>
