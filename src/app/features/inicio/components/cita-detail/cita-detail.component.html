<div class="mt-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
  @if (cita()) {
    <div class="bg-white rounded-[2rem] shadow-xl border border-primary-100 overflow-hidden">
      <div class="bg-primary-600 p-6 text-white">
        <h2 class="text-xl font-black uppercase tracking-tight">Detalle de la Cita #{{ id }}</h2>
      </div>
      
      <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
          <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Paciente</span>
          <p class="text-2xl font-black text-slate-800">{{ cita()?.mascota?.nombre }}</p>
          <p class="text-sm text-primary-600 font-bold uppercase">{{ cita()?.mascota?.especie }} - {{ cita()?.mascota?.raza }}</p>
        </div>
        
        <div class="text-right">
          <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Estado Actual</span>
          <p class="text-lg font-black text-indigo-600">{{ cita()?.estado }}</p>
        </div>
      </div>
      
      <div class="p-4 bg-slate-50 flex justify-end">
        <button routerLink="/inicio" class="text-xs font-black text-slate-400 hover:text-primary-600 transition-colors uppercase tracking-widest">
          Volver al Listado
        </button>
      </div>
    </div>
  } @else {
    <p class="text-center text-slate-400 py-10">Cargando información del paciente...</p>
  }
</div>
